# OpenOCD - USB-Blaster (09fb:6001) -> EP1C20 (ES, IDCODE 0x020840dd) -> Smaky 6 disk.
#   Programmer : openocd -f openocd-blaster.cfg -c "svf_program"
adapter driver usb_blaster
usb_blaster vid_pid 0x09fb 0x6001
transport select jtag
adapter speed 6000
jtag newtap ep1c20 tap -irlen 10 -expected-id 0x020840dd -ignore-version
proc svf_program {} {
    svf -tap ep1c20.tap -progress SM6Disk.svf
    shutdown
}
init
scan_chain
