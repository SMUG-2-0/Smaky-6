# OpenOCD - USB-Blaster original (09fb:6001) -> Cyclone I EP1C20 (carte Nios Dev 1C20)
# Programme le blink.svf généré par Quartus 9.1 (quartus_cpf).
#
#   Valider la chaîne JTAG :  openocd -f openocd-blaster.cfg -c "shutdown"
#   Programmer le FPGA      :  openocd -f openocd-blaster.cfg -c "svf_program"

adapter driver usb_blaster
usb_blaster vid_pid 0x09fb 0x6001
transport select jtag
adapter speed 6000

# TAP du Cyclone : IR=10 (lu dans le SVF). IDCODE EP1C20 attendu = 0x020850dd.
# -ignore-version : tolère un éventuel champ version différent.
jtag newtap ep1c20 tap -irlen 10 -expected-id 0x020840dd -ignore-version

# Helper de programmation (appelé via -c "svf_program")
proc svf_program {} {
    svf -tap ep1c20.tap -progress blink.svf
    shutdown
}

# init scanne la chaîne et affiche l'IDCODE réellement lu (preuve que le câble parle au FPGA).
init
scan_chain
